<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>404 — THE DAILY MALAISE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff; color: #000;
    font-family: "Courier New", Courier, monospace;
    max-width: 720px; margin: 0 auto; padding: 48px 20px;
    text-align: center;
  }
  .topbar { font-size: 11px; letter-spacing: 1px;
            border-bottom: 3px double #000; padding-bottom: 6px; }
  .code { font-size: 96px; font-weight: bold; letter-spacing: 6px;
          color: #c00; margin: 36px 0 6px; }
  h1 { font-size: 22px; letter-spacing: 2px; margin-bottom: 14px; }
  p { font-size: 13px; letter-spacing: 1px; line-height: 1.8; color: #333; }
  a { color: #000; font-weight: bold; }
  a:hover { background: #000; color: #fff; text-decoration: none; }
  .rule { border: none; border-top: 1px solid #000; margin: 28px 30%; }
  .src { font-size: 10px; color: #555; letter-spacing: 1px; margin-top: 4px; }
  @media (prefers-color-scheme: dark) {
    body { background: #101010; color: #e6e6e6; }
    a { color: #e6e6e6; }
    a:hover { background: #e6e6e6; color: #101010; }
    .topbar, .rule { border-color: #e6e6e6; }
    .code { color: #ff5c5c; }
    p { color: #bbb; }
    .src { color: #9a9a9a; }
  }
</style>
</head>
<body>
  <div class="topbar">THE DAILY MALAISE &middot; PAGE NOT FOUND DESK</div>
  <div class="code">404</div>
  <h1>THIS PAGE WAS PULLED OFF THE FRONT PAGE</h1>
  <p>IT SAT HERE TOO LONG WITHOUT RISING, AND THE NIGHT EDITOR<br>
     SHOWS NO MERCY PAST THIRTY HOURS. IT HAD ITS RUN.</p>
  <hr class="rule">
  <p><a href="/daily-malaise/">RETURN TO THE FRONT PAGE</a></p>
  <div class="src">TENURE EXPIRED &middot; NOT RISING &middot; NO OUTLETS PICKED IT UP</div>
</body>
</html>
